site_name: Kuira Android SDK
site_description: Android SDK for building Midnight zero-knowledge dApps. Passkey-derived identity, embedded wallet, contract runtime — one Gradle dependency.
site_url: https://kuiralabs.github.io/kuira-sdk-android/
repo_url: https://github.com/kuiralabs/kuira-sdk-android
repo_name: kuiralabs/kuira-sdk-android
edit_uri: edit/main/docs/

# Custom theme overrides live in `assets/stylesheets/kuira.css` —
# strict Midnight palette (Void + Light, no color), Dusk typography
# (W200-W500, never bold), GlassPanel-style code blocks, animated
# starfield + DustVortex effects on the landing page.
# Source of truth for the palette + type scale is the Kuira design
# system (core:designsystem/theme/MidnightColors.kt +
# core:designsystem/theme/DuskTypography.kt); CSS variables here are
# direct ports of those tokens.
theme:
  name: material
  # overrides/ holds minimal template tweaks layered on top of the
  # mkdocs-material base. Currently: overrides/main.html suppresses
  # the "{title} - {site_name}" pattern when title equals site_name
  # (cleans up the home page browser tab).
  custom_dir: overrides
  palette:
    # Auto-switch based on system preference.
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light scheme — off-brand fallback for accessibility. Inverts the
    # Void/Light tokens (white background, void-tier text opacities) so
    # the same rhythm of luminosity holds in either mode.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark scheme — the canonical Midnight palette. "Light in darkness,
    # stars against void." All the effects assume this scheme; in light
    # mode the canvases auto-adapt to a softer dust-on-white treatment.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs        # top-level tabs (Get started / Recipes / API / Security)
    - navigation.sections    # group sub-pages under sections in the sidebar
    - navigation.top         # back-to-top button
    - navigation.tracking    # update URL hash as user scrolls
    - search.suggest         # autocomplete in search box
    - search.highlight       # highlight matches on the page
    - content.code.copy      # copy-to-clipboard on code blocks
    - content.code.annotate  # inline annotations on code lines
    - content.tabs.link      # link tabbed content blocks across the page
    - toc.follow             # sidebar TOC tracks scroll position
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags
  # Jinja2 substitution — {{ kuira_version }}, {{ kuira_contract_plugin_version }}
  # get expanded from the extra: block below. Single point of edit when
  # bumping a release; ripples through every recipe and integration
  # snippet automatically. on_error_fail surfaces typos as build errors
  # rather than silent leakage.
  - macros:
      on_error_fail: true

markdown_extensions:
  # Admonitions — !!! note / warning / tip / etc. Used heavily in recipes.
  - admonition
  - pymdownx.details         # collapsible admonitions
  - pymdownx.superfences     # nested code blocks inside lists / admonitions
  # Code highlighting + per-line annotations. Conservative config —
  # the fancier line_spans/anchor_linenums features tickle a
  # pygments/Python-3.14 compat bug; can re-enable once that lands.
  - pymdownx.highlight
  - pymdownx.inlinehilite
  # Tabbed content — useful for "Gradle Kotlin DSL / Gradle Groovy" snippets.
  - pymdownx.tabbed:
      alternate_style: true
  # Task lists, footnotes, emoji.
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Anchor links on every heading.
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Get started:
    - Install + integrate: integration.md
  - Recipes:
    - recipes/index.md
    - Add Kuira to an Android project: recipes/add-kuira-to-an-android-project.md
    - Bind your app to a passkey domain: recipes/bind-your-app-to-a-passkey-domain.md
    - Set up Sigil identity: recipes/set-up-sigil-identity.md
    - Deploy and call a Compact contract: recipes/deploy-and-call-a-compact-contract.md
  - API reference: api-reference.md
  - Security: security.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kuiralabs
    - icon: fontawesome/solid/cube
      link: https://central.sonatype.com/namespace/io.github.kuiralabs
      name: Maven Central — io.github.kuiralabs
  # ─── Version pins (single source of truth) ────────────────────────
  # Bump these here when shipping a new alpha; macros plugin substitutes
  # them everywhere the markdown uses {{ kuira_version }} etc.
  #
  # - `kuira_version` — the SDK artifacts on Maven Central
  #   (io.github.kuiralabs:dapp-ui, midnight-sdk, identity, …).
  # - `kuira_contract_plugin_version` — the com.midnight.kuira.contract
  #   Gradle plugin. Will track `kuira_version` from alpha02 onward,
  #   but is a separate pin today because the plugin was authored
  #   during alpha02 dev and was never published as alpha01.
  kuira_version: "0.1.0-alpha01"
  kuira_contract_plugin_version: "0.1.0-alpha02"

extra_css:
  - assets/stylesheets/kuira.css

extra_javascript:
  - assets/javascripts/copy-prompt.js
  # Hero starfield — reduced-motion-aware, bails if the canvas isn't on
  # the page. Landing page only.
  - assets/javascripts/starfield.js
  # Interactive agent-prompt picker — the SDK's headline differentiator.
  # Landing page only; bails cleanly elsewhere.
  - assets/javascripts/prompt-picker.js
